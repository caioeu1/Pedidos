version: '3.8'

services:

  sqlserver:
    image: mcr.microsoft.com/azure-sql-edge
    container_name: pedidos_sqlserver
    environment:
      SA_PASSWORD: "Pedidos@123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'Pedidos@123' -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10   # 🔧 aumentei pra dar mais tempo pro SQL subir

  orders-api:
    build:
      context: ./Orders
      dockerfile: Orders.API/Dockerfile
    container_name: pedidos_api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Server=sqlserver;Database=PedidosDb;User Id=sa;Password=Pedidos@123;TrustServerCertificate=True
    depends_on:
      sqlserver:
        condition: service_healthy

volumes:
  sqlserver_data: